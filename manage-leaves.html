<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelSync AI | Manage Leaves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="app.js"></script>
</head>
<body>
  
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="p-6 flex items-center gap-2" style="padding: 24px; gap: 12px;">
        <div class="flex items-center justify-center" style="width: 40px; height: 40px; border-radius: 10px; background: var(--accent-gradient);">
          <i data-lucide="building" style="color: white; width: 24px;"></i>
        </div>
        <div>
          <h2 class="font-bold text-lg" style="line-height: 1.1;">HostelSync</h2>
          <span class="text-xs text-gradient font-bold">ADMIN PANEL</span>
        </div>
      </div>

      <nav style="flex: 1; overflow-y: auto; margin-top: 24px;">
        <a href="dashboard-admin.html" class="nav-item">
          <i data-lucide="layout-dashboard" style="width: 20px;"></i> Dashboard
        </a>
        <a href="manage-complaints.html" class="nav-item">
          <i data-lucide="message-square" style="width: 20px;"></i> All Complaints
        </a>
        <a href="manage-leaves.html" class="nav-item active">
          <i data-lucide="calendar" style="width: 20px;"></i> Leave Requests
        </a>
        <a href="ai-insights.html" class="nav-item">
          <i data-lucide="pie-chart" style="width: 20px;"></i> Analytics
        </a>
      </nav>

      <div style="padding: 16px; border-top: 1px solid var(--border-glass);">
        <a href="index.html" class="nav-item text-danger" style="color: var(--danger);">
          <i data-lucide="log-out" style="width: 20px;"></i> Sign Out
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <div class="flex items-center gap-4" style="gap: 16px;">
          <button class="theme-toggle btn btn-ghost" onclick="toggleTheme()" style="padding: 8px; cursor: pointer; background: transparent; border: none; color: var(--text-primary);"><i data-lucide="moon" style="width: 20px;"></i></button>
        </div>
      </header>
      
      <div class="page-container animate-fade-in" style="padding: 32px; max-width: 1200px; margin: 0 auto;">
        <div class="mb-8">
          <h1 class="text-3xl font-bold mb-2">Leave Request Approvals</h1>
          <p class="text-secondary">Approve or reject student leave requests.</p>
        </div>

        <div id="adminLeavesList" style="display: flex; flex-direction: column; gap: 16px;">
          <!-- Content injected via JS -->
        </div>

      </div>
    </main>
  </div>

  <script>
    lucide.createIcons();

    const loadAdminLeaves = () => {
      const leaves = getItems('leaves');
      const container = document.getElementById('adminLeavesList');
      container.innerHTML = '';
      
      if (leaves.length === 0) {
        container.innerHTML = '<p class="text-muted text-center" style="padding: 40px;">No leave requests found.</p>';
        return;
      }

      leaves.slice().reverse().forEach(l => {
        let badgeClass = l.status === 'Approved' ? 'success' : (l.status === 'Rejected' ? 'danger' : 'warning');
        
        let actionButtons = '';
        if (l.status === 'Pending') {
          actionButtons = `
            <button class="btn btn-primary" onclick="setLeaveStatus(${l.id}, 'Approved')" style="padding: 8px 16px; background: var(--success);"><i data-lucide="check" style="width:16px;"></i> Approve</button>
            <button class="btn btn-secondary" onclick="setLeaveStatus(${l.id}, 'Rejected')" style="padding: 8px 16px; color: var(--danger); border-color: var(--danger);"><i data-lucide="x" style="width:16px;"></i> Reject</button>
          `;
        } else {
          actionButtons = `<p class="text-sm text-muted">Processed</p>`;
        }

        container.innerHTML += `
          <div class="glass-card" style="padding: 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px;">
            <div style="flex: 1;">
              <div class="flex gap-4 items-center mb-2">
                <h3 class="text-lg font-bold">Student: Tanish Jain</h3>
                <span class="badge badge-${badgeClass}">${l.status}</span>
              </div>
              <p class="text-secondary text-sm mb-2"><strong>Dates:</strong> ${l.start} to ${l.end}</p>
              <p class="text-secondary text-sm"><strong>Reason:</strong> ${l.reason}</p>
              <div class="text-xs text-muted mt-3">Applied on ${l.date}</div>
            </div>
            <div class="flex gap-2" style="min-width: 250px; justify-content: flex-end;">
              ${actionButtons}
            </div>
          </div>
        `;
      });
      lucide.createIcons();
    };

    window.setLeaveStatus = (id, status) => {
      updateItemStatus('leaves', id, status);
      showNotification('Leave request ' + status.toLowerCase());
      loadAdminLeaves();
    };

    loadAdminLeaves();
  </script>
</body>
</html>
