<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelSync AI | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at 50% 50%, rgba(25, 25, 25, 1) 0%, rgba(15, 15, 15, 1) 100%);">
  
  <div style="position: absolute; top: 10%; left: 20%; width: 400px; height: 400px; background: var(--accent-primary); filter: blur(200px); opacity: 0.1; border-radius: 50%;"></div>
  <div style="position: absolute; bottom: 10%; right: 20%; width: 400px; height: 400px; background: var(--accent-secondary); filter: blur(200px); opacity: 0.1; border-radius: 50%;"></div>

  <div class="glass-panel animate-fade-in" style="width: 100%; max-width: 450px; padding: 40px; position: relative; z-index: 10; border-radius: 24px;">
    
    <div class="text-center" style="margin-bottom: 32px;">
      <div style="width: 64px; height: 64px; border-radius: 16px; background: var(--accent-gradient); box-shadow: var(--shadow-glow); margin: 0 auto 16px auto; display: flex; align-items: center; justify-content: center;">
        <i data-lucide="building" style="color: white; width: 32px; height: 32px;"></i>
      </div>
      <h2 class="text-2xl font-bold" style="margin-bottom: 8px;">Welcome to HostelSync AI</h2>
      <p class="text-muted" id="role-subtitle">Sign in to your Student account</p>
    </div>

    <div class="flex gap-2 glass-card" style="padding: 4px; border-radius: 12px; margin-bottom: 24px;">
      <button type="button" onclick="selectRole('Student', this)" class="role-btn flex-1 text-sm font-medium transition" style="padding: 8px 0; background: rgba(255,255,255,0.1); color: white; border-radius: 8px; border: none; cursor: pointer;">Student</button>
      <button type="button" onclick="selectRole('Warden', this)" class="role-btn flex-1 text-sm font-medium text-muted transition hover:text-white" style="padding: 8px 0; background: transparent; border: none; cursor: pointer;">Warden</button>
      <button type="button" onclick="selectRole('Admin', this)" class="role-btn flex-1 text-sm font-medium text-muted transition hover:text-white" style="padding: 8px 0; background: transparent; border: none; cursor: pointer;">Admin</button>
    </div>

    <form style="display: flex; flex-direction: column; gap: 16px;" onsubmit="handleLogin(event)">
      <div>
        <label class="text-sm font-medium text-secondary" style="display: block; margin-bottom: 4px;">Email Address</label>
        <div style="position: relative;">
          <i data-lucide="mail" style="position: absolute; left: 12px; top: 12px; width: 18px; height: 18px; color: var(--text-muted);"></i>
          <input type="email" class="input-field" placeholder="john@university.edu" style="padding-left: 40px;" required />
        </div>
      </div>
      
      <div>
        <label class="text-sm font-medium text-secondary" style="display: block; margin-bottom: 4px;">Password</label>
        <div style="position: relative;">
          <i data-lucide="lock" style="position: absolute; left: 12px; top: 12px; width: 18px; height: 18px; color: var(--text-muted);"></i>
          <input type="password" class="input-field" placeholder="••••••••" style="padding-left: 40px;" required />
        </div>
      </div>

      <div style="display: flex; justify-content: flex-end;">
        <a href="#" class="text-xs hover:underline" style="color: var(--accent-primary);">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 8px;">Sign In</button>
    </form>

  </div>

  <script>
    lucide.createIcons();
    
    // Theme logic
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    let currentRole = 'Student';

    function selectRole(role, btnElement) {
      currentRole = role;
      document.querySelectorAll('.role-btn').forEach(btn => {
        btn.style.background = 'transparent';
        btn.style.color = 'var(--text-muted)';
      });
      btnElement.style.background = 'rgba(255,255,255,0.1)';
      btnElement.style.color = 'white';
      
      const subtitle = document.getElementById('role-subtitle');
      subtitle.innerText = `Sign in to your ${role} account`;
    }

    function handleLogin(event) {
      event.preventDefault();
      if (currentRole === 'Student') {
        window.location.href = 'dashboard.html';
      } else if (currentRole === 'Warden') {
        window.location.href = 'dashboard-warden.html';
      } else if (currentRole === 'Admin') {
        window.location.href = 'dashboard-admin.html';
      }
    }
  </script>
</body>
</html>
