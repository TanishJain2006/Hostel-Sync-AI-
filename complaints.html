<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelSync AI | Complaints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="app.js"></script>
</head>
<body>
  
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="p-6 flex items-center gap-2" style="padding: 24px; gap: 12px;">
        <div class="flex items-center justify-center" style="width: 40px; height: 40px; border-radius: 10px; background: var(--accent-gradient);">
          <i data-lucide="building" style="color: white; width: 24px;"></i>
        </div>
        <div>
          <h2 class="font-bold text-lg" style="line-height: 1.1;">HostelSync</h2>
          <span class="text-xs text-gradient font-bold">AI PLATFORM</span>
        </div>
      </div>

      <div style="padding: 0 16px; margin-bottom: 16px;">
        <div class="glass-card flex items-center" style="padding: 12px; gap: 12px; border-radius: 12px;">
          <div style="width: 36px; height: 36px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center;">
            <i data-lucide="user" style="width: 20px; color: var(--text-muted);"></i>
          </div>
          <div>
            <div class="text-sm font-semibold">Tanish Jain</div>
            <div class="text-xs text-muted">Student</div>
          </div>
        </div>
      </div>

      <nav style="flex: 1; overflow-y: auto;">
        <div class="text-xs font-semibold text-muted mb-2 px-6 mt-4" style="letter-spacing: 1px; text-transform: uppercase; padding: 0 24px; margin-top: 16px; margin-bottom: 8px;">Main Menu</div>
        
        <a href="dashboard.html" class="nav-item">
          <i data-lucide="layout-dashboard" style="width: 20px;"></i> Dashboard
        </a>
        <a href="gatepass.html" class="nav-item">
          <i data-lucide="qr-code" style="width: 20px;"></i> Gate Pass
        </a>
        <a href="leave.html" class="nav-item">
          <i data-lucide="calendar" style="width: 20px;"></i> Leaves
        </a>
        <a href="complaints.html" class="nav-item active">
          <i data-lucide="message-square" style="width: 20px;"></i> Complaints
        </a>
        <a href="ai-insights.html" class="nav-item">
          <i data-lucide="brain-circuit" style="width: 20px;"></i> AI Insights
        </a>
      </nav>

      <div style="padding: 16px; border-top: 1px solid var(--border-glass);">
        <a href="index.html" class="nav-item text-danger" style="color: var(--danger);">
          <i data-lucide="log-out" style="width: 20px;"></i> Sign Out
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <div class="flex items-center gap-4" style="gap: 16px;">
          <button class="theme-toggle btn btn-ghost" onclick="toggleTheme()" style="padding: 8px; cursor: pointer; background: transparent; border: none; color: var(--text-primary);"><i data-lucide="moon" style="width: 20px;"></i></button>
        </div>
      </header>
      
      <div class="page-container animate-fade-in" style="padding: 32px; max-width: 1000px; margin: 0 auto;">
        <div class="mb-8">
          <h1 class="text-3xl font-bold mb-2">Complaint Management</h1>
          <p class="text-secondary">Raise and track maintenance and facility issues.</p>
        </div>

        <div class="grid grid-cols-2 gap-8" style="gap: 32px;">
          <!-- Form Section -->
          <div>
            <form id="complaintForm" class="glass-card p-6" style="display: flex; flex-direction: column; gap: 16px;">
              <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="plus-circle"></i> New Complaint</h2>
              
              <div>
                <label class="text-sm font-medium text-secondary mb-2 block">Title</label>
                <input type="text" id="cTitle" class="input-field" placeholder="E.g. Fan not working" required />
              </div>
              
              <div>
                <label class="text-sm font-medium text-secondary mb-2 block">Room Number</label>
                <input type="text" id="cRoom" class="input-field" placeholder="E.g. 402" required />
              </div>
              
              <div>
                <label class="text-sm font-medium text-secondary mb-2 block">Description</label>
                <textarea id="cDesc" class="input-field" rows="4" placeholder="Describe the issue in detail..." required></textarea>
              </div>

              <!-- AI Preview Card -->
              <div id="aiPreview" class="badge badge-accent p-4" style="display: none; width: 100%; border-radius: var(--radius-md); padding: 16px; flex-direction: column; align-items: flex-start; gap: 8px;">
                <!-- Content injected via JS -->
              </div>

              <button type="submit" class="btn btn-primary w-full mt-4" style="padding: 14px;">Submit Complaint</button>
            </form>
          </div>

          <!-- List Section -->
          <div style="display: flex; flex-direction: column; gap: 16px;">
            <h2 class="text-xl font-bold mb-2">Your Complaints</h2>
            <div id="complaintsList" style="display: flex; flex-direction: column; gap: 16px;">
              <!-- Complaints injected via JS -->
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    lucide.createIcons();

    const loadComplaints = () => {
      const complaints = getItems('complaints');
      const container = document.getElementById('complaintsList');
      container.innerHTML = '';
      if (complaints.length === 0) {
        container.innerHTML = '<p class="text-muted text-sm">No complaints found.</p>';
        return;
      }
      // Reverse to show latest first
      complaints.slice().reverse().forEach(c => {
        let badgeClass = c.status === 'Resolved' ? 'success' : (c.status === 'Pending' ? 'warning' : 'info');
        container.innerHTML += `
          <div class="glass-card" style="padding: 24px; display: flex; flex-direction: column; gap: 12px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
              <h3 class="text-lg font-bold">${c.title}</h3>
              <div class="badge badge-${badgeClass}">${c.status}</div>
            </div>
            <p class="text-secondary text-sm">${c.desc}</p>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;">
              <span class="badge badge-accent" style="font-size: 10px;">${c.category}</span>
              <span class="badge badge-danger" style="font-size: 10px;">${c.priority} Priority</span>
              <span class="badge badge-info" style="font-size: 10px;">${c.dept}</span>
            </div>
            <div class="text-xs text-muted mt-2">Submitted on ${c.date} | Room ${c.room}</div>
          </div>
        `;
      });
    };

    document.getElementById('complaintForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const title = document.getElementById('cTitle').value;
      const room = document.getElementById('cRoom').value;
      const desc = document.getElementById('cDesc').value;
      
      const aiData = analyzeComplaint(desc);
      addItem('complaints', { title, room, desc, status: 'Pending', ...aiData });
      
      showNotification('Complaint submitted successfully');
      e.target.reset();
      document.getElementById('aiPreview').style.display = 'none';
      loadComplaints();
    });

    document.getElementById('cDesc').addEventListener('input', (e) => {
      const desc = e.target.value;
      const preview = document.getElementById('aiPreview');
      if (desc.length > 5) {
        const aiData = analyzeComplaint(desc);
        preview.style.display = 'flex';
        preview.innerHTML = `
          <div class="flex items-center gap-2 text-accent-primary" style="font-weight: 600;"><i data-lucide="brain-circuit" style="width:16px;"></i> AI Categorization</div>
          <div class="text-sm text-primary" style="margin-top: 4px;">Category: <b>${aiData.category}</b></div>
          <div class="text-sm text-primary">Priority: <b style="color: var(--danger);">${aiData.priority}</b></div>
          <div class="text-sm text-primary">Department: <b>${aiData.dept}</b></div>
        `;
        lucide.createIcons();
      } else {
        preview.style.display = 'none';
      }
    });

    loadComplaints();
  </script>
</body>
</html>
