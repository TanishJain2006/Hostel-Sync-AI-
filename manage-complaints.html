<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelSync AI | Manage Complaints</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="app.js"></script>
</head>
<body>
  
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="p-6 flex items-center gap-2" style="padding: 24px; gap: 12px;">
        <div class="flex items-center justify-center" style="width: 40px; height: 40px; border-radius: 10px; background: var(--accent-gradient);">
          <i data-lucide="building" style="color: white; width: 24px;"></i>
        </div>
        <div>
          <h2 class="font-bold text-lg" style="line-height: 1.1;">HostelSync</h2>
          <span class="text-xs text-gradient font-bold">ADMIN PANEL</span>
        </div>
      </div>

      <nav style="flex: 1; overflow-y: auto; margin-top: 24px;">
        <a href="dashboard-admin.html" class="nav-item">
          <i data-lucide="layout-dashboard" style="width: 20px;"></i> Dashboard
        </a>
        <a href="manage-complaints.html" class="nav-item active">
          <i data-lucide="message-square" style="width: 20px;"></i> All Complaints
        </a>
        <a href="manage-leaves.html" class="nav-item">
          <i data-lucide="calendar" style="width: 20px;"></i> Leave Requests
        </a>
        <a href="ai-insights.html" class="nav-item">
          <i data-lucide="pie-chart" style="width: 20px;"></i> Analytics
        </a>
      </nav>

      <div style="padding: 16px; border-top: 1px solid var(--border-glass);">
        <a href="index.html" class="nav-item text-danger" style="color: var(--danger);">
          <i data-lucide="log-out" style="width: 20px;"></i> Sign Out
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <div class="flex items-center gap-4" style="gap: 16px;">
          <button class="theme-toggle btn btn-ghost" onclick="toggleTheme()" style="padding: 8px; cursor: pointer; background: transparent; border: none; color: var(--text-primary);"><i data-lucide="moon" style="width: 20px;"></i></button>
        </div>
      </header>
      
      <div class="page-container animate-fade-in" style="padding: 32px; max-width: 1200px; margin: 0 auto;">
        <div class="mb-8 flex justify-between items-end">
          <div>
            <h1 class="text-3xl font-bold mb-2">Complaint Administration</h1>
            <p class="text-secondary">Manage and resolve all student complaints.</p>
          </div>
          <div class="flex gap-4">
            <select id="filterCategory" class="input-field" style="width: 150px; background-color: var(--bg-surface);">
              <option value="All">All Categories</option>
              <option value="Electrical">Electrical</option>
              <option value="Plumbing">Plumbing</option>
              <option value="IT Support">IT Support</option>
              <option value="Housekeeping">Housekeeping</option>
              <option value="General">General</option>
            </select>
            <select id="filterStatus" class="input-field" style="width: 150px; background-color: var(--bg-surface);">
              <option value="All">All Status</option>
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Resolved">Resolved</option>
            </select>
          </div>
        </div>

        <div id="adminComplaintsList" style="display: flex; flex-direction: column; gap: 16px;">
          <!-- Content injected via JS -->
        </div>

      </div>
    </main>
  </div>

  <script>
    lucide.createIcons();

    const loadAdminComplaints = () => {
      const filterStatus = document.getElementById('filterStatus').value;
      const filterCat = document.getElementById('filterCategory').value;
      const complaints = getItems('complaints');
      const container = document.getElementById('adminComplaintsList');
      container.innerHTML = '';
      
      let filtered = complaints;
      if (filterStatus !== 'All') {
        filtered = filtered.filter(c => c.status === filterStatus);
      }
      if (filterCat !== 'All') {
        filtered = filtered.filter(c => c.category === filterCat);
      }

      if (filtered.length === 0) {
        container.innerHTML = '<p class="text-muted text-center" style="padding: 40px;">No complaints match the filter.</p>';
        return;
      }

      filtered.slice().reverse().forEach(c => {
        let badgeClass = c.status === 'Resolved' ? 'success' : (c.status === 'Pending' ? 'warning' : 'info');
        
        container.innerHTML += `
          <div class="glass-card" style="padding: 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px;">
            <div style="flex: 1;">
              <div class="flex gap-4 items-center mb-2">
                <h3 class="text-lg font-bold">${c.title}</h3>
                <span class="badge badge-${badgeClass}">${c.status}</span>
              </div>
              <p class="text-secondary text-sm">${c.desc}</p>
              <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;">
                <span class="text-xs text-muted"><i data-lucide="door-open" style="width:12px;"></i> Room ${c.room}</span>
                <span class="text-xs text-muted"><i data-lucide="calendar" style="width:12px;"></i> ${c.date}</span>
                <span class="badge badge-accent" style="font-size: 10px;">${c.category}</span>
                <span class="badge badge-danger" style="font-size: 10px;">${c.priority} Priority</span>
                <span class="badge badge-info" style="font-size: 10px;">${c.dept}</span>
              </div>
            </div>
            <div class="flex flex-col gap-2" style="min-width: 150px;">
              <select class="input-field status-select" data-id="${c.id}" style="background-color: var(--bg-surface); padding: 8px 12px;">
                <option value="Pending" ${c.status === 'Pending' ? 'selected' : ''}>Pending</option>
                <option value="In Progress" ${c.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                <option value="Resolved" ${c.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
              </select>
              <button class="btn btn-primary" onclick="updateCStatus(${c.id})" style="padding: 8px 12px;">Update Status</button>
            </div>
          </div>
        `;
      });
      lucide.createIcons();
    };

    document.getElementById('filterStatus').addEventListener('change', loadAdminComplaints);
    document.getElementById('filterCategory').addEventListener('change', loadAdminComplaints);

    window.updateCStatus = (id) => {
      const select = document.querySelector(`.status-select[data-id="${id}"]`);
      const newStatus = select.value;
      updateItemStatus('complaints', id, newStatus);
      showNotification('Complaint status updated to ' + newStatus);
      loadAdminComplaints();
    };

    loadAdminComplaints();
  </script>
</body>
</html>
